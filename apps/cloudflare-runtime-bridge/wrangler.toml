name = "synara-runtime-bridge"
main = "src/workerEntry.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# The bearer secret the Synara server authenticates with. Set via
# `wrangler secret put BRIDGE_AUTH_TOKEN`; never commit the value.
# [vars] intentionally omits BRIDGE_AUTH_TOKEN — it is a secret, not a plain var.

[[durable_objects.bindings]]
name = "RUNTIME_INSTANCES"
class_name = "RuntimeInstanceDurableObjectBinding"

[[migrations]]
tag = "v1"
new_classes = ["RuntimeInstanceDurableObjectBinding"]
